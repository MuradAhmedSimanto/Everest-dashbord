<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Everest Dashboard</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/sidebar.css"/>
  <link rel="stylesheet" href="css/pages.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-logo">
      <div class="logo-mountain">
        <svg viewBox="0 0 60 50" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="30,2 58,48 2,48" fill="none" stroke="#ff0000" stroke-width="3"/>
          <polygon points="30,10 50,48 10,48" fill="#ff0000" opacity="0.3"/>
          <polygon points="22,28 30,12 38,28" fill="#ff0000" opacity="0.7"/>
          <line x1="2" y1="38" x2="58" y2="38" stroke="#ff0000" stroke-width="1.5" opacity="0.5"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">EVEREST</span>
        <span class="brand-sub">Social Dashboard</span>
      </div>
    </div>
  </div>

  <div class="sidebar-nav">
    <div class="nav-section-label">MAIN</div>
    <a class="nav-item active" data-page="overview" onclick="navigateTo('overview')">
      <i class="fas fa-chart-pie"></i><span>Overview</span>
    </a>
    <a class="nav-item" data-page="users" onclick="navigateTo('users')">
      <i class="fas fa-users"></i><span>All Users</span>
    </a>
    <a class="nav-item" data-page="add-user" onclick="navigateTo('add-user')">
      <i class="fas fa-user-plus"></i><span>Add User</span>
    </a>
    <a class="nav-item" data-page="admin-table" onclick="navigateTo('admin-table')">
      <i class="fas fa-table"></i><span>Admin Table</span>
    </a>

    <div class="nav-section-label">CONTENT</div>
    <a class="nav-item" data-page="posts" onclick="navigateTo('posts')">
      <i class="fas fa-newspaper"></i><span>User Posts</span>
    </a>
    <a class="nav-item" data-page="content" onclick="navigateTo('content')">
      <i class="fas fa-photo-video"></i><span>Content</span>
    </a>
    <a class="nav-item" data-page="announcements" onclick="navigateTo('announcements')">
      <i class="fas fa-bullhorn"></i><span>Announcements</span>
    </a>

    <div class="nav-section-label">ANALYTICS</div>
    <a class="nav-item" data-page="statistics" onclick="navigateTo('statistics')">
      <i class="fas fa-chart-line"></i><span>Statistics</span>
    </a>
    <a class="nav-item" data-page="reports" onclick="navigateTo('reports')">
      <i class="fas fa-file-alt"></i><span>Reports</span>
    </a>
    <a class="nav-item" data-page="activity" onclick="navigateTo('activity')">
      <i class="fas fa-stream"></i><span>Activity Log</span>
    </a>

    <div class="nav-section-label">MANAGEMENT</div>
    <a class="nav-item" data-page="verification" onclick="navigateTo('verification')">
      <i class="fas fa-check-circle"></i><span>Verification</span>
    </a>
    <a class="nav-item" data-page="roles" onclick="navigateTo('roles')">
      <i class="fas fa-shield-alt"></i><span>Roles & Permissions</span>
    </a>
    <a class="nav-item" data-page="support" onclick="navigateTo('support')">
      <i class="fas fa-headset"></i><span>Support Tickets</span>
    </a>
    <a class="nav-item" data-page="feedback" onclick="navigateTo('feedback')">
      <i class="fas fa-comments"></i><span>Feedback</span>
    </a>
    <a class="nav-item" data-page="settings" onclick="navigateTo('settings')">
      <i class="fas fa-cog"></i><span>Settings</span>
    </a>
  </div>

  <div class="sidebar-founder" onclick="navigateTo('founder')">
    <div class="founder-cover" id="sidebarFounderCover"></div>
    <div class="founder-info">
      <div class="founder-avatar-wrap">
        <img src="" id="sidebarFounderAvatar" class="founder-avatar" onerror="this.src='https://ui-avatars.com/api/?name=Murad+Ahmed&background=ff0000&color=fff&size=80'"/>
      </div>
      <div class="founder-details">
        <span class="founder-label">FOUNDER</span>
        <span class="founder-name">Murad Ahmed Simanto</span>
        <span class="founder-badge"><i class="fas fa-crown"></i> Platform Owner</span>
      </div>
    </div>
  </div>
</aside>

<!-- MAIN CONTENT -->
<div class="main-wrapper">
  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="globalSearch" placeholder="Search users, posts, tickets..." oninput="globalSearchFn(this.value)"/>
        <div class="search-results" id="searchResults"></div>
      </div>
    </div>
    <div class="topbar-right">
      <button class="topbar-btn" onclick="navigateTo('activity')" title="Activity Log"><i class="fas fa-stream"></i></button>
      <div class="notification-wrap">
        <button class="topbar-btn notif-btn" onclick="toggleNotifications()" title="Notifications">
          <i class="fas fa-bell"></i>
          <span class="notif-badge" id="notifBadge">0</span>
        </button>
        <div class="notif-dropdown" id="notifDropdown">
          <div class="notif-header"><span>Notifications</span><button onclick="clearAllNotifs()">Clear All</button></div>
          <div class="notif-list" id="notifList"></div>
        </div>
      </div>
      <div class="admin-profile" onclick="navigateTo('founder')">
        <img src="" id="topbarAdminAvatar" onerror="this.src='https://ui-avatars.com/api/?name=Murad+Ahmed&background=ff0000&color=fff&size=40'"/>
        <span>Admin</span>
      </div>
    </div>
  </header>

  <!-- PAGE CONTENT -->
  <main class="page-content" id="pageContent">
    <!-- Pages load here -->
  </main>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
<div class="modal" id="mainModal">
  <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
  <div class="modal-body" id="modalBody"></div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<script src="js/storage.js"></script>

<script src="js/pages/overview.js"></script>
<script src="js/pages/users.js"></script>
<script src="js/pages/founder.js"></script>
<script src="js/pages/posts.js"></script>
<script src="js/pages/statistics.js"></script>
<script src="js/pages/activity.js"></script>
<script src="js/pages/settings.js"></script>
<script src="js/pages/roles.js"></script>
<script src="js/pages/support.js"></script>
<script src="js/pages/feedback.js"></script>
<script src="js/pages/content.js"></script>
<script src="js/pages/announcements.js"></script>
<script src="js/pages/verification.js"></script>
<script src="js/pages/reports.js"></script>
<script src="js/pages/admintable.js"></script>

<script src="js/app.js"></script>
<script src="js/init.js"></script>
</body>
</html>
